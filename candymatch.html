<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>🍭 Candy Match!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(160deg,#2d0a1e,#1a0a2e);overflow:hidden;height:100dvh;width:100vw;user-select:none;font-family:'Fredoka One',cursive}
#hud{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(0,0,0,.3);backdrop-filter:blur(10px);z-index:10}
.back-btn{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:50%;width:40px;height:40px;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none}
.hud-title{font-size:1rem;color:#fff}
.hud-score{font-size:1rem;color:#FFD700}
#stage{position:fixed;top:52px;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:8px}
#grid{display:grid;gap:4px;touch-action:none}
.cell{border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);
  transition:transform .12s,box-shadow .12s;touch-action:manipulation}
.cell:active{transform:scale(.9)}
.cell.sel{border-color:#FFD700;box-shadow:0 0 14px rgba(255,215,0,.5);transform:scale(1.08)}
.cell.matched{animation:matchPop .4s ease-out forwards}
@keyframes matchPop{0%{transform:scale(1.2)}50%{transform:scale(1.3)}100%{transform:scale(0);opacity:0}}
#overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(20,5,30,.9);backdrop-filter:blur(14px)}
.ov-ico{font-size:4.5rem;animation:bounce 1s ease-in-out infinite alternate}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.ov-title{font-size:2rem;color:#FF6B9D;text-align:center}
.ov-sub{font-size:.9rem;color:rgba(255,255,255,.7);text-align:center;font-family:'Nunito',sans-serif;font-weight:700}
.play-btn{background:linear-gradient(135deg,#FF6B9D,#C77DFF);border:none;border-radius:22px;padding:13px 34px;font-size:1.1rem;color:#fff;cursor:pointer;touch-action:manipulation;box-shadow:0 5px 18px rgba(255,107,157,.4)}
.play-btn:active{transform:scale(.94)}
.msg{font-size:.9rem;color:#C77DFF;text-align:center;min-height:1.3rem}
.score-row{display:flex;gap:16px;font-size:.85rem;color:rgba(255,255,255,.7)}
</style></head><body>
<div id="hud">
  <a href="index.html" class="back-btn">🏠</a>
  <div class="hud-title">🍭 Candy Match!</div>
  <div class="hud-score">⭐ <span id="score">0</span></div>
</div>
<div id="stage">
  <div class="score-row"><span>Moves: <span id="moves">0</span></span><span>Matches: <span id="matches">0</span></span></div>
  <div id="grid"></div>
  <div class="msg" id="msg">Swap 2 candies to make a row of 3!</div>
</div>
<div id="overlay">
  <div class="ov-ico">🍭</div>
  <div class="ov-title">Candy Match!</div>
  <div class="ov-sub">Tap two candies to swap them!<br>Make a row or column of 3 to score!</div>
  <div style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:#FFD700" id="finalScore"></div>
  <button class="play-btn" onclick="startGame()">Let's Match! 🍬</button>
</div>
<script>
const CANDIES=['🍭','🍬','🍫','🧁','🍩','🍪','🎂','🍮'];
const COLS=6,ROWS=7;
let grid=[],selected=null,score=0,moves=0,matches=0,locked=false;

function startGame(){
  document.getElementById('overlay').style.display='none';
  score=0;moves=0;matches=0;selected=null;locked=false;
  document.getElementById('score').textContent=0;
  document.getElementById('moves').textContent=0;
  document.getElementById('matches').textContent=0;
  buildGrid();render();
}

function buildGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++)grid[r][c]=randCandy();}
  // Ensure no starting matches
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    while(isMatch(r,c))grid[r][c]=randCandy();
  }
}
function randCandy(){return CANDIES[Math.floor(Math.random()*6)];}
function isMatch(r,c){
  if(c>=2&&grid[r][c]===grid[r][c-1]&&grid[r][c]===grid[r][c-2])return true;
  if(r>=2&&grid[r][c]===grid[r-1][c]&&grid[r][c]===grid[r-2][c])return true;
  return false;
}

function render(){
  const el=document.getElementById('grid');
  const stage=document.getElementById('stage');
  const sw=Math.min(stage.offsetWidth-16,420);
  const sh=stage.offsetHeight-80;
  const cellSz=Math.min(Math.floor(sw/COLS)-4,Math.floor(sh/ROWS)-4,56);
  el.style.gridTemplateColumns=`repeat(${COLS},${cellSz}px)`;
  el.innerHTML='';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const cell=document.createElement('div');cell.className='cell';
    if(selected&&selected[0]===r&&selected[1]===c)cell.classList.add('sel');
    cell.style.cssText=`width:${cellSz}px;height:${cellSz}px;font-size:${cellSz*.6}px`;
    cell.textContent=grid[r][c];
    cell.dataset.r=r;cell.dataset.c=c;
    cell.addEventListener('pointerdown',e=>{e.preventDefault();tapCell(r,c);});
    el.appendChild(cell);
  }
}

function tapCell(r,c){
  if(locked)return;
  if(selected===null){selected=[r,c];render();return;}
  const [sr,sc]=selected;
  // Must be adjacent
  if(Math.abs(r-sr)+Math.abs(c-sc)!==1){selected=[r,c];render();return;}
  selected=null;
  // Swap
  [grid[r][c],grid[sr][sc]]=[grid[sr][sc],grid[r][c]];
  moves++;document.getElementById('moves').textContent=moves;
  if(navigator.vibrate)navigator.vibrate(8);
  locked=true;
  setTimeout(()=>{
    if(!findAndClear()){// Swap back if no match
      [grid[r][c],grid[sr][sc]]=[grid[sr][sc],grid[r][c]];
      document.getElementById('msg').textContent='No match there! Try again 🍬';
    }
    locked=false;render();
  },200);
}

function findAndClear(){
  let found=[];
  // Horizontal
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS-2;c++){
    if(grid[r][c]&&grid[r][c]===grid[r][c+1]&&grid[r][c]===grid[r][c+2]){
      found.push([r,c],[r,c+1],[r,c+2]);
      if(c+3<COLS&&grid[r][c]===grid[r][c+3])found.push([r,c+3]);
    }
  }
  // Vertical
  for(let r=0;r<ROWS-2;r++)for(let c=0;c<COLS;c++){
    if(grid[r][c]&&grid[r][c]===grid[r+1][c]&&grid[r][c]===grid[r+2][c]){
      found.push([r,c],[r+1,c],[r+2,c]);
    }
  }
  if(found.length===0)return false;
  // Remove dupes
  const unique=[...new Set(found.map(([r,c])=>r+','+c))].map(s=>s.split(',').map(Number));
  unique.forEach(([r,c])=>grid[r][c]=null);
  const pts=unique.length;score+=pts*10;matches++;
  document.getElementById('score').textContent=score;
  document.getElementById('matches').textContent=matches;
  document.getElementById('msg').textContent=pts>=4?'🌟 Super Match! +'+pts*10:pts>=3?'Great! +'+pts*10:'Match!';
  if(navigator.vibrate)navigator.vibrate([20,10,20]);
  // Drop and refill
  setTimeout(()=>{
    for(let c=0;c<COLS;c++){
      let col=grid.map(r=>r[c]).filter(Boolean);
      while(col.length<ROWS)col.unshift(randCandy());
      for(let r=0;r<ROWS;r++)grid[r][c]=col[r];
    }
    render();
    // Chain check
    setTimeout(()=>{if(findAndClear())render();},300);
  },350);
  return true;
}
window.addEventListener('resize',()=>{if(grid.length)render();});
</script></body></html>
