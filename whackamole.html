<!-- WHACK A MOLE -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🔨 Whack-a-Mole!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1a0a2e;--panel:rgba(255,255,255,.07);--pb:rgba(255,255,255,.15);
    --gold:#FFD700;--pink:#FF6B9D;--cyan:#00E5FF;--green:#69FF47;--purple:#C77DFF;--orange:#FF9500}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  body{background:var(--bg);font-family:'Nunito',sans-serif;color:#fff;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;overflow-x:hidden;
    background-image:radial-gradient(ellipse at 25% 25%,rgba(199,125,255,.15) 0%,transparent 50%),
      radial-gradient(ellipse at 75% 75%,rgba(0,229,255,.1) 0%,transparent 50%)}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;
    background-image:radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,.5) 0%,transparent 100%),
      radial-gradient(1px 1px at 60% 10%,rgba(255,255,255,.4) 0%,transparent 100%),
      radial-gradient(1px 1px at 85% 55%,rgba(255,255,255,.35) 0%,transparent 100%)}
  header{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px 6px;z-index:10}
  .back{background:var(--panel);border:2px solid var(--pb);color:#C8B8FF;border-radius:50%;
    width:44px;height:44px;font-size:20px;display:flex;align-items:center;justify-content:center;text-decoration:none}
  .title{font-family:'Fredoka One',cursive;font-size:26px;
    background:linear-gradient(135deg,var(--gold),var(--pink));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hud{width:100%;max-width:480px;display:flex;gap:8px;padding:0 16px 8px;z-index:10}
  .pill{flex:1;background:var(--panel);border:2px solid var(--pb);border-radius:16px;padding:6px 8px;text-align:center}
  .pill .lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#C8B8FF;margin-bottom:2px}
  .pill .val{font-family:'Fredoka One',cursive;font-size:20px;color:var(--gold)}
  #tv{color:var(--cyan)}
  .wrap{width:100%;max-width:480px;padding:0 16px;display:flex;flex-direction:column;align-items:center;gap:12px;z-index:10}
  .timer-bar-wrap{width:100%;background:var(--panel);border:2px solid var(--pb);border-radius:12px;height:18px;overflow:hidden}
  #timer-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));
    transition:width .1s linear;border-radius:10px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:400px}
  .hole{background:rgba(40,20,80,.7);border:3px solid var(--pb);border-radius:20px;
    aspect-ratio:1;display:flex;align-items:flex-end;justify-content:center;
    overflow:hidden;cursor:pointer;position:relative;
    box-shadow:inset 0 8px 20px rgba(0,0,0,.5);
    transition:border-color .1s}
  .hole:active{border-color:var(--pink)}
  .mole{font-size:clamp(40px,12vw,64px);transform:translateY(110%);transition:transform .15s cubic-bezier(.34,1.56,.64,1);
    position:absolute;bottom:4px;user-select:none;pointer-events:none}
  .mole.up{transform:translateY(0%)}
  .mole.whacked{transform:translateY(0%) scale(1.3) rotate(-15deg)}
  .start-btn{background:linear-gradient(135deg,var(--pink),var(--purple));border:none;
    border-radius:20px;color:#fff;font-family:'Fredoka One',cursive;font-size:22px;
    padding:16px 48px;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.4);width:100%;max-width:300px;
    transition:transform .1s,box-shadow .1s}
  .start-btn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.4)}
  #overlay{position:fixed;inset:0;background:rgba(10,5,20,.9);display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px)}
  #overlay.hidden{display:none}
  .ocard{background:linear-gradient(135deg,#2d1b4e,#1a0a2e);border:3px solid var(--purple);
    border-radius:28px;padding:30px 34px;text-align:center;
    box-shadow:0 0 60px rgba(199,125,255,.35);max-width:340px;width:90%}
  .oem{font-size:60px;margin-bottom:10px;display:block;animation:bop .8s ease infinite alternate}
  @keyframes bop{from{transform:translateY(0)}to{transform:translateY(-12px)}}
  .otitle{font-family:'Fredoka One',cursive;font-size:32px;
    background:linear-gradient(135deg,var(--gold),var(--pink));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
  .osub{font-size:14px;color:#C8B8FF;margin-bottom:14px;line-height:1.55}
  .oscr{font-family:'Fredoka One',cursive;font-size:24px;color:var(--gold);margin-bottom:20px}
  .opbtn{background:linear-gradient(135deg,var(--pink),var(--purple));border:none;
    border-radius:20px;color:#fff;font-family:'Fredoka One',cursive;font-size:22px;
    padding:14px 40px;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.4);width:100%}
  .opbtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.4)}
  .particle{position:fixed;pointer-events:none;font-size:24px;z-index:200;animation:fup .9s ease-out forwards}
  @keyframes fup{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-100px) scale(.3)}}
  .sp{height:20px}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">🏠</a>
  <div class="title">🔨 Whack-a-Mole!</div>
  <div style="width:44px"></div>
</header>
<div class="hud">
  <div class="pill"><div class="lbl">⭐ Score</div><div class="val" id="sc">0</div></div>
  <div class="pill"><div class="lbl">🏆 Best</div><div class="val" id="hi">0</div></div>
  <div class="pill"><div class="lbl">💨 Miss</div><div class="val" id="ms">0</div></div>
  <div class="pill"><div class="lbl">⏱ Time</div><div class="val" id="tv">30</div></div>
</div>
<div class="wrap">
  <div class="timer-bar-wrap"><div id="timer-bar" style="width:100%"></div></div>
  <div class="grid" id="grid"></div>
  <button class="start-btn" id="start-btn" onclick="startGame()">🔨 Start Whacking!</button>
  <div class="sp"></div>
</div>
<div id="overlay">
  <div class="ocard">
    <span class="oem" id="oem">🔨</span>
    <div class="otitle" id="otitle">Whack-a-Mole!</div>
    <div class="osub" id="osub">Tap the moles before they hide! Watch out for 💀 skulls — don't whack those!</div>
    <div class="oscr" id="oscr"></div>
    <button class="opbtn" id="obtn" onclick="startGame()">🔨 Start Whacking!</button>
  </div>
</div>
<script>
const HOLES=9, GAME_TIME=30000;
const MOLES=['🐭','🐹','🦔','🐿️','🦫'];
const BADS=['💀','👿','🤡'];
let holes=[], score, highScore, misses, timeLeft;
let gameRunning=false, raf, lastTs=0;
let moleTimers=[];

// Build grid
const grid=document.getElementById('grid');
for(let i=0;i<HOLES;i++){
  const hole=document.createElement('div');
  hole.className='hole';
  const mole=document.createElement('div');
  mole.className='mole';
  mole.textContent='🐭';
  hole.appendChild(mole);
  hole.addEventListener('pointerdown',()=>whack(i));
  grid.appendChild(hole);
  holes.push({el:hole,moleEl:mole,up:false,bad:false,timer:0});
}

function startGame(){
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('start-btn').style.display='none';
  highScore=parseInt(localStorage.getItem('whackHS')||'0');
  score=0;misses=0;timeLeft=GAME_TIME;
  holes.forEach(h=>{h.up=false;h.bad=false;h.moleEl.className='mole';h.timer=0});
  updateHUD();
  gameRunning=true;
  lastTs=performance.now();
  if(raf)cancelAnimationFrame(raf);
  raf=requestAnimationFrame(loop);
  scheduleMoles();
}

function scheduleMoles(){
  if(!gameRunning)return;
  const available=holes.filter(h=>!h.up);
  if(available.length>0){
    const h=available[Math.floor(Math.random()*available.length)];
    const bad=Math.random()<0.2;
    h.bad=bad;
    h.moleEl.textContent=bad?BADS[Math.floor(Math.random()*BADS.length)]:MOLES[Math.floor(Math.random()*MOLES.length)];
    h.up=true; h.moleEl.className='mole up';
    h.timer=setTimeout(()=>hideHole(h),800+Math.random()*700);
  }
  const next=300+Math.random()*400;
  setTimeout(scheduleMoles,next);
}

function hideHole(h){
  if(!h.up)return;
  if(h.up&&!h.whacked&&!h.bad){misses++;updateHUD();}
  h.up=false;h.whacked=false;
  h.moleEl.className='mole';
}

function whack(i){
  if(!gameRunning)return;
  const h=holes[i];
  if(!h.up)return;
  clearTimeout(h.timer);
  if(h.bad){
    score=Math.max(0,score-15);
    h.moleEl.className='mole whacked';
    sfxBad();
  } else {
    score+=10;
    h.moleEl.className='mole whacked';
    sfxWhack();
    spawnPtcl('⭐',h.el);
  }
  updateHUD();
  h.up=false;h.whacked=true;
  setTimeout(()=>{h.moleEl.className='mole';h.whacked=false;},300);
  try{if(actx&&actx.state==='suspended')actx.resume()}catch(e){}
}

function loop(ts){
  if(!gameRunning)return;
  const dt=Math.min(ts-lastTs,50);lastTs=ts;
  timeLeft-=dt;
  if(timeLeft<=0){
    timeLeft=0;gameOver();
  }
  const pct=timeLeft/GAME_TIME;
  document.getElementById('timer-bar').style.width=(pct*100)+'%';
  document.getElementById('timer-bar').style.background=
    pct>0.5?'linear-gradient(90deg,#69FF47,#00E5FF)':
    pct>0.25?'linear-gradient(90deg,#FFD700,#FF9500)':'linear-gradient(90deg,#FF6B9D,#ff4444)';
  document.getElementById('tv').textContent=Math.ceil(timeLeft/1000);
  raf=requestAnimationFrame(loop);
}

function gameOver(){
  gameRunning=false;cancelAnimationFrame(raf);
  holes.forEach(h=>{clearTimeout(h.timer);h.up=false;h.moleEl.className='mole';});
  if(score>highScore){highScore=score;localStorage.setItem('whackHS',highScore);}
  document.getElementById('start-btn').style.display='';
  showOverlay('🏆','Time\'s Up!','Amazing whacking!','⭐ '+score+' points!','🔨 Play Again!',startGame);
}

function updateHUD(){
  document.getElementById('sc').textContent=score;
  document.getElementById('hi').textContent=highScore;
  document.getElementById('ms').textContent=misses;
}

function showOverlay(em,ti,su,sc,bt,cb){
  document.getElementById('oem').textContent=em;
  document.getElementById('otitle').textContent=ti;
  document.getElementById('osub').textContent=su;
  document.getElementById('oscr').textContent=sc;
  const b=document.getElementById('obtn');b.textContent=bt;b.onclick=cb||startGame;
  document.getElementById('overlay').classList.remove('hidden');
}

let actx;
function beep(f,d,t,v){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);o.type=t||'square';o.frequency.value=f;
    g.gain.setValueAtTime(v||.1,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);
    o.start();o.stop(actx.currentTime+d);
  }catch(e){}
}
function sfxWhack(){beep(600,.06,'square',.15);setTimeout(()=>beep(800,.04,'square',.1),60)}
function sfxBad(){[300,250,200].forEach((f,i)=>setTimeout(()=>beep(f,.06,'sawtooth',.12),i*50))}

function spawnPtcl(e,el){
  const r=el.getBoundingClientRect();
  const p=document.createElement('div');p.className='particle';p.textContent=e;
  p.style.left=(r.left+r.width/2)+'px';p.style.top=(r.top+r.height/2)+'px';
  document.body.appendChild(p);setTimeout(()=>p.remove(),900);
}
</script>
</body>
</html>
