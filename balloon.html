<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>🎯 Balloon Pop!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(160deg,#1a0a2e 0%,#0d1b4b 50%,#1a0a2e 100%);
  font-family:'Nunito',sans-serif;overflow:hidden;height:100dvh;width:100vw;user-select:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 20% 20%,rgba(199,125,255,.15) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 80%,rgba(0,229,255,.1) 0%,transparent 50%)}
#hud{position:fixed;top:0;left:0;right:0;height:58px;display:flex;align-items:center;
  justify-content:space-between;padding:0 14px;background:rgba(0,0,0,.3);
  backdrop-filter:blur(12px);z-index:10;border-bottom:1px solid rgba(255,255,255,.1)}
.back-btn{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);
  border-radius:50%;width:42px;height:42px;color:#fff;font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;text-decoration:none;touch-action:manipulation}
.hud-title{font-family:'Fredoka One',cursive;font-size:1.1rem;color:#fff}
.hud-score{font-family:'Fredoka One',cursive;font-size:1rem;color:#FFD700}
#canvas{position:fixed;top:58px;left:0;width:100%;height:calc(100dvh - 58px);display:block}
#overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  background:rgba(10,5,30,.88);backdrop-filter:blur(14px)}
.ov-ico{font-size:5rem;animation:bob 1.5s ease-in-out infinite alternate}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.ov-title{font-family:'Fredoka One',cursive;font-size:2rem;color:#FFD700;text-align:center}
.ov-sub{font-family:'Nunito',sans-serif;font-size:1rem;color:rgba(255,255,255,.7);text-align:center}
.ov-score{font-family:'Fredoka One',cursive;font-size:1.4rem;color:#FF6B9D}
.play-btn{background:linear-gradient(135deg,#FF6B9D,#C77DFF);border:none;border-radius:24px;
  padding:14px 36px;font-family:'Fredoka One',cursive;font-size:1.2rem;color:#fff;
  cursor:pointer;touch-action:manipulation;box-shadow:0 6px 20px rgba(199,125,255,.4)}
.play-btn:active{transform:scale(.95)}
.pop-fx{position:fixed;pointer-events:none;z-index:15;font-size:1.5rem;
  animation:popFly .6s ease-out forwards}
@keyframes popFly{0%{transform:scale(1);opacity:1}100%{transform:scale(2) translateY(-40px);opacity:0}}
</style></head><body>
<div id="hud">
  <a href="index.html" class="back-btn">🏠</a>
  <div class="hud-title">🎯 Balloon Pop!</div>
  <div class="hud-score">⭐ <span id="score">0</span></div>
</div>
<canvas id="canvas"></canvas>
<div id="overlay">
  <div class="ov-ico">🎯</div>
  <div class="ov-title">Balloon Pop!</div>
  <div class="ov-sub">Tap balloons before they escape!<br>Don't let them reach the top!</div>
  <div class="ov-score" id="finalScore"></div>
  <button class="play-btn" onclick="startGame()">Let's Pop! 🎈</button>
</div>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let W,H,balloons=[],score=0,lives=3,level=1,raf,running=false,spawnTimer=0,spawnRate=120;
const COLORS=['#FF6B9D','#C77DFF','#00E5FF','#69FF47','#FFD700','#FF9500','#FF6347','#00CED1'];
const EMOJIS=['🎈','🎀','⭐','🌟','💜','💛','❤️','💙'];

function resize(){
  W=canvas.width=canvas.offsetWidth;
  H=canvas.height=canvas.offsetHeight;
}
window.addEventListener('resize',resize);

function Balloon(){
  this.x=W*(.1+Math.random()*.8);
  this.y=H+60;
  this.r=clamp(W*.065,28,52);
  this.speed=(1+Math.random()*1.5)*(1+level*.15);
  this.color=COLORS[Math.floor(Math.random()*COLORS.length)];
  this.emoji=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  this.wobble=Math.random()*Math.PI*2;
  this.wobbleSpeed=.04+Math.random()*.03;
  this.popped=false;
  this.popAnim=0;
}
function clamp(v,mn,mx){return Math.min(Math.max(v,mn),mx)}

Balloon.prototype.update=function(){
  this.wobble+=this.wobbleSpeed;
  this.y-=this.speed;
  this.x+=Math.sin(this.wobble)*1.5;
};
Balloon.prototype.draw=function(){
  ctx.save();
  // String
  ctx.beginPath();ctx.moveTo(this.x,this.y+this.r);
  ctx.lineTo(this.x,this.y+this.r+30);
  ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1.5;ctx.stroke();
  // Body
  const g=ctx.createRadialGradient(this.x-this.r*.3,this.y-this.r*.3,this.r*.05,this.x,this.y,this.r);
  g.addColorStop(0,'rgba(255,255,255,.6)');g.addColorStop(.4,this.color);g.addColorStop(1,this.color+'99');
  ctx.beginPath();ctx.ellipse(this.x,this.y,this.r,this.r*1.15,0,0,Math.PI*2);
  ctx.fillStyle=g;ctx.fill();
  // Emoji
  ctx.font=`${this.r*.9}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(this.emoji,this.x,this.y);
  ctx.restore();
};

function spawnBurst(){
  const el=document.createElement('div');
  el.className='pop-fx';el.textContent='💥';
  el.style.cssText=`left:${event?.clientX||W/2}px;top:${event?.clientY||H/2}px`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),700);
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  balloons=[];score=0;lives=3;level=1;spawnTimer=0;spawnRate=90;
  document.getElementById('score').textContent=0;
  running=true;loop();
}

function loop(){
  if(!running)return;
  raf=requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);
  // Stars bg
  if(!loop.stars){loop.stars=[];for(let i=0;i<60;i++)loop.stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5,a:Math.random()});}
  loop.stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${.3+s.a*.5})`;ctx.fill();});
  // Lives
  ctx.font='22px serif';ctx.textAlign='left';
  for(let i=0;i<lives;i++)ctx.fillText('❤️',14+i*28,H-14);
  // Spawn
  spawnTimer++;
  if(spawnTimer>=spawnRate){spawnTimer=0;balloons.push(new Balloon());}
  // Level up
  level=1+Math.floor(score/10);
  spawnRate=Math.max(30,90-level*8);
  // Update & draw
  for(let i=balloons.length-1;i>=0;i--){
    const b=balloons[i];
    b.update();b.draw();
    if(b.y<-b.r*2){
      balloons.splice(i,1);lives--;
      if(lives<=0){endGame();}
    }
  }
}

function tap(cx,cy){
  if(!running)return;
  for(let i=balloons.length-1;i>=0;i--){
    const b=balloons[i];
    const dx=cx-b.x,dy=cy-b.y;
    if(dx*dx+dy*dy<(b.r*1.3)*(b.r*1.3)){
      balloons.splice(i,1);score++;
      document.getElementById('score').textContent=score;
      // Pop effect
      const el=document.createElement('div');el.className='pop-fx';el.textContent='💥';
      el.style.cssText=`left:${cx-16}px;top:${cy-16}px`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),700);
      if(navigator.vibrate)navigator.vibrate(12);
      break;
    }
  }
}

function endGame(){
  running=false;cancelAnimationFrame(raf);
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.querySelector('.ov-title').textContent=score>=20?'Amazing! 🌟':score>=10?'Great Job! 🎉':'Try Again! 💪';
  document.getElementById('finalScore').textContent=`You popped ${score} balloons!`;
}

canvas.addEventListener('pointerdown',e=>{e.preventDefault();tap(e.clientX-0,e.clientY-58);});
resize();
</script></body></html>
