<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌀 Maze Runner!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1a0a2e;--panel:rgba(255,255,255,.07);--pb:rgba(255,255,255,.15);
    --gold:#FFD700;--pink:#FF6B9D;--cyan:#00E5FF;--green:#69FF47;--purple:#C77DFF}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  body{background:var(--bg);font-family:'Nunito',sans-serif;color:#fff;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;overflow-x:hidden;
    background-image:radial-gradient(ellipse at 20% 20%,rgba(199,125,255,.15) 0%,transparent 50%),
      radial-gradient(ellipse at 80% 80%,rgba(0,229,255,.1) 0%,transparent 50%)}
  header{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px 6px;z-index:10}
  .back{background:var(--panel);border:2px solid var(--pb);color:#C8B8FF;border-radius:50%;
    width:44px;height:44px;font-size:20px;display:flex;align-items:center;justify-content:center;text-decoration:none}
  .title{font-family:'Fredoka One',cursive;font-size:24px;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hud{width:100%;max-width:480px;display:flex;gap:8px;padding:0 16px 8px;z-index:10}
  .pill{flex:1;background:var(--panel);border:2px solid var(--pb);border-radius:16px;padding:6px 8px;text-align:center}
  .pill .lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#C8B8FF;margin-bottom:2px}
  .pill .val{font-family:'Fredoka One',cursive;font-size:20px;color:var(--gold)}
  #tv{color:var(--cyan)}
  .wrap{width:100%;max-width:480px;padding:0 16px;display:flex;flex-direction:column;align-items:center;gap:10px;z-index:10}
  #gc{border-radius:18px;border:3px solid var(--cyan);
    box-shadow:0 0 30px rgba(0,229,255,.4),0 0 70px rgba(0,229,255,.15);
    display:block;max-width:100%;touch-action:none}
  .dpad{position:relative;width:200px;height:200px}
  .db{position:absolute;width:68px;height:68px;border:none;border-radius:18px;cursor:pointer;
    font-size:30px;display:flex;align-items:center;justify-content:center;
    user-select:none;box-shadow:0 6px 0 rgba(0,0,0,.45);transition:transform .08s,box-shadow .08s}
  .db:active{transform:translateY(4px)!important;box-shadow:0 2px 0 rgba(0,0,0,.45)!important}
  #du{background:linear-gradient(135deg,#a8edea,#fed6e3);color:#333;top:0;left:50%;transform:translateX(-50%)}
  #dd{background:linear-gradient(135deg,#a8edea,#fed6e3);color:#333;bottom:0;left:50%;transform:translateX(-50%)}
  #dl{background:linear-gradient(135deg,#ffecd2,#fcb69f);color:#333;left:0;top:50%;transform:translateY(-50%)}
  #dr{background:linear-gradient(135deg,#ffecd2,#fcb69f);color:#333;right:0;top:50%;transform:translateY(-50%)}
  #du:active{transform:translateX(-50%) translateY(4px)!important}
  #dd:active{transform:translateX(-50%) translateY(4px)!important}
  #dl:active{transform:translateY(calc(-50% + 4px))!important}
  #dr:active{transform:translateY(calc(-50% + 4px))!important}
  .dc{position:absolute;width:50px;height:50px;background:rgba(255,255,255,.06);
    border-radius:14px;top:50%;left:50%;transform:translate(-50%,-50%);
    border:2px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:22px}
  .brow{display:flex;gap:12px;width:100%;justify-content:center}
  .abtn{flex:1;max-width:180px;height:56px;border:none;border-radius:18px;
    font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;
    box-shadow:0 6px 0 rgba(0,0,0,.4);user-select:none;transition:transform .1s,box-shadow .1s}
  .abtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.4)}
  #pb{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff}
  #overlay{position:fixed;inset:0;background:rgba(10,5,20,.9);display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px)}
  #overlay.hidden{display:none}
  .ocard{background:linear-gradient(135deg,#2d1b4e,#1a0a2e);border:3px solid var(--cyan);
    border-radius:28px;padding:28px 32px;text-align:center;
    box-shadow:0 0 60px rgba(0,229,255,.3);max-width:340px;width:90%}
  .oem{font-size:56px;margin-bottom:10px;display:block;animation:bop .8s ease infinite alternate}
  @keyframes bop{from{transform:translateY(0)}to{transform:translateY(-10px)}}
  .otitle{font-family:'Fredoka One',cursive;font-size:30px;
    background:linear-gradient(135deg,var(--cyan),var(--purple));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
  .osub{font-size:13px;color:#C8B8FF;margin-bottom:12px;line-height:1.55}
  .oscr{font-family:'Fredoka One',cursive;font-size:22px;color:var(--gold);margin-bottom:16px}
  .diff-row{display:flex;gap:8px;margin-bottom:14px}
  .diff-btn{flex:1;padding:8px 4px;border:2px solid rgba(255,255,255,.2);border-radius:12px;
    font-family:'Fredoka One',cursive;font-size:13px;cursor:pointer;
    background:rgba(255,255,255,.08);color:#fff;transition:all .15s}
  .diff-btn.active{background:linear-gradient(135deg,var(--cyan),var(--purple));border-color:transparent}
  .opbtn{background:linear-gradient(135deg,var(--cyan),var(--purple));border:none;
    border-radius:20px;color:#fff;font-family:'Fredoka One',cursive;font-size:21px;
    padding:13px 38px;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.4);width:100%}
  .opbtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.4)}
  .particle{position:fixed;pointer-events:none;font-size:22px;z-index:200;animation:fup .8s ease-out forwards}
  @keyframes fup{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-90px)}}
  .sp{height:16px}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">🏠</a>
  <div class="title">🌀 Maze Runner!</div>
  <div style="width:44px"></div>
</header>
<div class="hud">
  <div class="pill"><div class="lbl">⭐ Score</div><div class="val" id="sc">0</div></div>
  <div class="pill"><div class="lbl">🏆 Best</div><div class="val" id="hi">0</div></div>
  <div class="pill"><div class="lbl">⏱ Time</div><div class="val" id="tv">0</div></div>
  <div class="pill"><div class="lbl">🚀 Level</div><div class="val" id="lv">1</div></div>
</div>
<div class="wrap">
  <canvas id="gc"></canvas>
  <div class="dpad">
    <button class="db" id="du">⬆️</button>
    <button class="db" id="dl">⬅️</button>
    <div class="dc">🧭</div>
    <button class="db" id="dr">➡️</button>
    <button class="db" id="dd">⬇️</button>
  </div>
  <div class="brow">
    <button class="abtn" id="pb" onclick="togglePause()">⏸ PAUSE</button>
  </div>
  <div class="sp"></div>
</div>
<div id="overlay">
  <div class="ocard">
    <span class="oem" id="oem">🌀</span>
    <div class="otitle" id="otitle">Maze Runner!</div>
    <div class="osub">Find your way to the 🚪 exit! Collect ⭐ stars along the way. Faster = more bonus points!</div>
    <div class="oscr" id="oscr"></div>
    <div class="diff-row">
      <button class="diff-btn active" id="d1" onclick="setDiff(1)">🌱 Easy<br><small>9×9</small></button>
      <button class="diff-btn" id="d2" onclick="setDiff(2)">🔥 Medium<br><small>13×13</small></button>
      <button class="diff-btn" id="d3" onclick="setDiff(3)">⚡ Hard<br><small>17×17</small></button>
    </div>
    <button class="opbtn" onclick="startGame()">🧭 Explore!</button>
  </div>
</div>
<script>
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');

// ── EMOJI BLIT HELPER (fixes iOS/WebKit transparency) ─────────────
// ctx.fillText(emoji) on a dark/clearRect'd canvas composites incorrectly
// on WebKit — emoji glyphs go transparent. Fix: draw to offscreen canvas
// then blit with drawImage(). The main canvas always has an opaque
// fillRect background before any emoji is drawn, so compositing is clean.
const _oc  = document.createElement('canvas');
const _oct = _oc.getContext('2d');
function blitEmoji(emoji, fontSize, cx, cy) {
  const pad = 10;
  const sz  = Math.ceil(fontSize) + pad * 2;
  if (_oc.width  !== sz) _oc.width  = sz;
  if (_oc.height !== sz) _oc.height = sz;
  _oct.clearRect(0, 0, sz, sz);
  _oct.font         = `${fontSize}px serif`;
  _oct.textAlign    = 'center';
  _oct.textBaseline = 'middle';
  _oct.fillText(emoji, sz / 2, sz / 2);
  ctx.drawImage(_oc, cx - sz / 2, cy - sz / 2);
}

const SZ     = Math.floor(Math.min(window.innerWidth - 32, 448));
canvas.width  = SZ;
canvas.height = SZ;
const CW = SZ, CH = SZ;

// ── DIFFICULTY ────────────────────────────────────────────────
const DIFF_CFG = { 1:{cols:9,rows:9}, 2:{cols:13,rows:13}, 3:{cols:17,rows:17} };
let diff = 1;
function setDiff(d){ diff=d; [1,2,3].forEach(i=>document.getElementById('d'+i).classList.toggle('active',i===d)); }

// ── MAZE GENERATION (Recursive Backtracker / DFS) ─────────────
// Cells stored as bitmask: bit0=N, bit1=E, bit2=S, bit3=W (wall removed = passage)
const N=1,E=2,S=4,W=8;
const OPP={[N]:S,[S]:N,[E]:W,[W]:E};
const DX={[N]:0,[S]:0,[E]:1,[W]:-1};
const DY={[N]:-1,[S]:1,[E]:0,[W]:0};

let maze, COLS, ROWS, CELL_SIZE;
let player, score, highScore, level, elapsed;
let stars = [], gameRunning=false, gamePaused=false;
let raf, lastTs=0;
let moveQueue = [], lastMove=0;
const MOVE_DELAY = 120; // ms between tile moves
const keys = {};

function generateMaze(cols, rows){
  const cells = Array.from({length:rows}, ()=>new Array(cols).fill(0));
  const visited = Array.from({length:rows}, ()=>new Array(cols).fill(false));
  function carve(x,y){
    visited[y][x]=true;
    const dirs=[N,S,E,W].sort(()=>Math.random()-.5);
    dirs.forEach(dir=>{
      const nx=x+DX[dir], ny=y+DY[dir];
      if(nx>=0&&nx<cols&&ny>=0&&ny<rows&&!visited[ny][nx]){
        cells[y][x]|=dir; cells[ny][nx]|=OPP[dir];
        carve(nx,ny);
      }
    });
  }
  carve(0,0);
  return cells;
}

function placeStars(){
  stars=[];
  // Place ~15% of cells as stars, avoid start and end
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if((x===0&&y===0)||(x===COLS-1&&y===ROWS-1)) continue;
      if(Math.random()<0.14) stars.push({x,y,collected:false});
    }
  }
}

function startGame(){
  document.getElementById('overlay').classList.add('hidden');
  highScore = parseInt(localStorage.getItem('mazeHS')||'0');
  const cfg = DIFF_CFG[diff];
  COLS=cfg.cols; ROWS=cfg.rows;
  CELL_SIZE = Math.floor(Math.min(CW/COLS, CH/ROWS));
  score=0; level=1; elapsed=0;
  maze = generateMaze(COLS,ROWS);
  player = {x:0, y:0, px:0, py:0, animT:1};
  placeStars();
  updateHUD();
  gameRunning=true; gamePaused=false; moveQueue=[];
  document.getElementById('pb').textContent='⏸ PAUSE';
  lastTs=performance.now();
  if(raf) cancelAnimationFrame(raf);
  raf=requestAnimationFrame(loop);
}

function togglePause(){
  if(!gameRunning)return;
  gamePaused=!gamePaused;
  document.getElementById('pb').textContent=gamePaused?'▶️ GO!':'⏸ PAUSE';
  if(!gamePaused){lastTs=performance.now();raf=requestAnimationFrame(loop);}
}

// ── MOVE ─────────────────────────────────────────────────────
function tryMove(dir){
  if(!gameRunning||gamePaused) return;
  if(!(maze[player.y][player.x]&dir)) return; // wall blocks
  const nx=player.x+DX[dir], ny=player.y+DY[dir];
  if(nx<0||nx>=COLS||ny<0||ny>=ROWS) return;
  player.px=player.x; player.py=player.y;
  player.x=nx; player.y=ny; player.animT=0;
  try{if(actx&&actx.state==='suspended')actx.resume();}catch(e){}
  sfxStep();
  checkStars();
  if(player.x===COLS-1&&player.y===ROWS-1) levelComplete();
}

function checkStars(){
  stars.forEach(s=>{
    if(!s.collected&&s.x===player.x&&s.y===player.y){
      s.collected=true; score+=50; updateHUD(); sfxStar();
      spawnPtcl('⭐', player.x*CELL_SIZE+CELL_SIZE/2, player.y*CELL_SIZE+CELL_SIZE/2);
    }
  });
}

function levelComplete(){
  const timeBonus = Math.max(0, 500 - elapsed*2);
  score += 200 + timeBonus;
  level++;
  sfxWin();
  [0,1,2,3].forEach(i=>setTimeout(()=>spawnPtcl(['🎉','⭐','✨'][i%3],CW/2,CH/2),i*100));
  setTimeout(()=>{
    const cfg = DIFF_CFG[diff];
    COLS=Math.min(cfg.cols+(level-1)*2, 21);
    ROWS=COLS;
    CELL_SIZE = Math.floor(Math.min(CW/COLS, CH/ROWS));
    maze=generateMaze(COLS,ROWS);
    player={x:0,y:0,px:0,py:0,animT:1};
    elapsed=0; placeStars(); updateHUD();
  },600);
}

// ── LOOP ──────────────────────────────────────────────────────
function loop(ts){
  if(!gameRunning||gamePaused) return;
  const dt=Math.min(ts-lastTs,50); lastTs=ts;
  elapsed+=dt/1000;

  // Smooth animation
  if(player.animT<1) player.animT=Math.min(1,player.animT+dt/100);

  // Key-held movement
  if(ts-lastMove>MOVE_DELAY){
    if(keys['ArrowUp']||keys['w'])    { tryMove(N); lastMove=ts; }
    else if(keys['ArrowDown']||keys['s']) { tryMove(S); lastMove=ts; }
    else if(keys['ArrowLeft']||keys['a']) { tryMove(W); lastMove=ts; }
    else if(keys['ArrowRight']||keys['d']){ tryMove(E); lastMove=ts; }
  }

  if(Math.floor(ts/1000)>Math.floor((ts-dt)/1000)) updateHUD();
  draw();
  raf=requestAnimationFrame(loop);
}

// ── DRAW ──────────────────────────────────────────────────────
const WALL_COL  = '#4a1fcc';
const WALL_GLOW = '#7c3aed';
const FLOOR_COL = '#0d0520';

function draw(){
  ctx.fillStyle=FLOOR_COL; ctx.fillRect(0,0,CW,CH);

  const offX = Math.round((CW - COLS*CELL_SIZE)/2);
  const offY = Math.round((CH - ROWS*CELL_SIZE)/2);
  const W2=2; // wall thickness

  // Floor tint
  ctx.fillStyle='rgba(100,50,200,.08)';
  ctx.fillRect(offX,offY,COLS*CELL_SIZE,ROWS*CELL_SIZE);

  // Walls
  ctx.strokeStyle=WALL_COL; ctx.lineWidth=W2*2.5;
  ctx.shadowColor=WALL_GLOW; ctx.shadowBlur=6;
  ctx.lineCap='round';
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const cell=maze[y][x];
      const cx=offX+x*CELL_SIZE, cy=offY+y*CELL_SIZE;
      ctx.beginPath();
      if(!(cell&N)){ctx.moveTo(cx,cy);ctx.lineTo(cx+CELL_SIZE,cy);}
      if(!(cell&E)){ctx.moveTo(cx+CELL_SIZE,cy);ctx.lineTo(cx+CELL_SIZE,cy+CELL_SIZE);}
      if(!(cell&S)){ctx.moveTo(cx,cy+CELL_SIZE);ctx.lineTo(cx+CELL_SIZE,cy+CELL_SIZE);}
      if(!(cell&W)){ctx.moveTo(cx,cy);ctx.lineTo(cx,cy+CELL_SIZE);}
      ctx.stroke();
    }
  }
  ctx.shadowBlur=0;

  // Exit
  const ex=offX+(COLS-1)*CELL_SIZE+CELL_SIZE/2, ey=offY+(ROWS-1)*CELL_SIZE+CELL_SIZE/2;
  ctx.shadowColor='#69FF47'; ctx.shadowBlur=14;
  blitEmoji('🚪', CELL_SIZE*.75, ex, ey);
  ctx.shadowBlur=0;

  // Stars
  stars.forEach(s=>{
    if(s.collected) return;
    blitEmoji('⭐', CELL_SIZE*.6, offX+s.x*CELL_SIZE+CELL_SIZE/2, offY+s.y*CELL_SIZE+CELL_SIZE/2);
  });

  // Player with smooth animation
  const t=player.animT;
  const drawX=offX+(player.px+(player.x-player.px)*t)*CELL_SIZE+CELL_SIZE/2;
  const drawY=offY+(player.py+(player.y-player.py)*t)*CELL_SIZE+CELL_SIZE/2;
  ctx.shadowColor='#00E5FF'; ctx.shadowBlur=16;
  blitEmoji('🧒', CELL_SIZE*.78, drawX, drawY);
  ctx.shadowBlur=0;

  // Mini-map (show visited hint — just show solved path glow)
  // Timer on canvas
  ctx.font=`bold ${Math.round(CW*.045)}px "Fredoka One",cursive`;
  ctx.fillStyle='rgba(0,229,255,.5)'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(`⏱ ${Math.floor(elapsed)}s`,CW/2,4);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';

  if(gamePaused){
    ctx.fillStyle='rgba(10,5,30,.72)'; ctx.fillRect(0,0,CW,CH);
    ctx.font=`bold ${CW*.12}px "Fredoka One",cursive`;
    ctx.fillStyle='#FFD700'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⏸',CW/2,CH/2);
  }
}

function updateHUD(){
  document.getElementById('sc').textContent=score;
  document.getElementById('hi').textContent=Math.max(score,highScore);
  document.getElementById('tv').textContent=Math.floor(elapsed)+'s';
  document.getElementById('lv').textContent=level;
  if(score>highScore){highScore=score;localStorage.setItem('mazeHS',highScore);}
}

// ── AUDIO ────────────────────────────────────────────────────
let actx;
function beep(f,d,t,v){
  try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);o.type=t||'sine';o.frequency.value=f;
    g.gain.setValueAtTime(v||.08,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);
    o.start();o.stop(actx.currentTime+d);}catch(e){}
}
function sfxStep(){beep(300,.03,'sine',.05);}
function sfxStar(){beep(660,.06,'square',.1);setTimeout(()=>beep(880,.06,'square',.08),80);}
function sfxWin(){[440,550,660,770,880].forEach((f,i)=>setTimeout(()=>beep(f,.1,'square',.12),i*80));}

// ── INPUT ─────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  const first={ArrowUp:N,ArrowDown:S,ArrowLeft:W,ArrowRight:E,w:N,s:S,a:W,d:E};
  if(first[e.key]){e.preventDefault();tryMove(first[e.key]);lastMove=performance.now();}
  if(e.key==='p'||e.key==='Escape')togglePause();
});
document.addEventListener('keyup',e=>keys[e.key]=false);

// D-pad
[[['du','ArrowUp',N],['dd','ArrowDown',S],['dl','ArrowLeft',W],['dr','ArrowRight',E]]].flat().forEach(([id,key,dir])=>{
  const btn=document.getElementById(id);
  let iv=null;
  const start=e=>{
    e.preventDefault();keys[key]=true;
    tryMove(dir);lastMove=performance.now();
    iv=setInterval(()=>{if(gameRunning&&!gamePaused){tryMove(dir);lastMove=performance.now();}},MOVE_DELAY);
    try{if(actx&&actx.state==='suspended')actx.resume();}catch(e2){}
  };
  const stop=e=>{e.preventDefault();keys[key]=false;clearInterval(iv);iv=null;};
  btn.addEventListener('touchstart',start,{passive:false});
  btn.addEventListener('touchend',stop,{passive:false});
  btn.addEventListener('mousedown',start);
  btn.addEventListener('mouseup',stop);
  btn.addEventListener('mouseleave',stop);
});

// Swipe on canvas
let swp=null;
canvas.addEventListener('touchstart',e=>{e.preventDefault();swp=e.touches[0];},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();if(!swp)return;
  const dx=e.changedTouches[0].clientX-swp.clientX,dy=e.changedTouches[0].clientY-swp.clientY;
  if(Math.abs(dx)>Math.abs(dy)){tryMove(dx>0?E:W);}else{tryMove(dy>0?S:N);}
  swp=null;
},{passive:false});

function spawnPtcl(e,cx,cy){
  const el=document.createElement('div');el.className='particle';el.textContent=e;
  const r=canvas.getBoundingClientRect();
  el.style.left=(r.left+cx)+'px';el.style.top=(r.top+cy)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),800);
}
draw();
</script>
</body>
</html>
