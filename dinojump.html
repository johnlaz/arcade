<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>🦕 Dino Jump!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(180deg,#87CEEB 0%,#87CEEB 60%,#90EE90 60%,#228B22 100%);
  font-family:'Fredoka One',cursive;overflow:hidden;height:100dvh;width:100vw;user-select:none}
#hud{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;
  justify-content:space-between;padding:0 14px;background:rgba(0,0,0,.25);
  backdrop-filter:blur(10px);z-index:10}
.back-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);
  border-radius:50%;width:40px;height:40px;color:#fff;font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;text-decoration:none}
.hud-title{font-size:1rem;color:#fff}
.hud-score{font-size:1rem;color:#FFD700}
#canvas{position:fixed;top:52px;left:0;width:100%;height:calc(100dvh - 52px);display:block;cursor:pointer}
#overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;
  background:rgba(0,40,80,.85);backdrop-filter:blur(12px)}
.ov-ico{font-size:5rem;animation:bob 1.2s ease-in-out infinite alternate}
@keyframes bob{from{transform:translateY(0) rotate(-5deg)}to{transform:translateY(-10px) rotate(5deg)}}
.ov-title{font-size:2rem;color:#FFD700;text-align:center}
.ov-sub{font-size:.95rem;color:rgba(255,255,255,.75);text-align:center;font-family:'Nunito',sans-serif;font-weight:700}
.ov-score{font-size:1.3rem;color:#FF6B9D}
.play-btn{background:linear-gradient(135deg,#69FF47,#00C851);border:none;border-radius:22px;
  padding:13px 34px;font-family:'Fredoka One',cursive;font-size:1.1rem;color:#003300;
  cursor:pointer;touch-action:manipulation;box-shadow:0 5px 18px rgba(105,255,71,.4)}
.play-btn:active{transform:scale(.94)}
</style></head><body>
<div id="hud">
  <a href="index.html" class="back-btn">🏠</a>
  <div class="hud-title">🦕 Dino Jump!</div>
  <div class="hud-score">⭐ <span id="score">0</span></div>
</div>
<canvas id="canvas"></canvas>
<div id="overlay">
  <div class="ov-ico">🦕</div>
  <div class="ov-title">Dino Jump!</div>
  <div class="ov-sub">Tap or press SPACE to jump!<br>Dodge the obstacles!</div>
  <div class="ov-score" id="finalScore"></div>
  <button class="play-btn" onclick="startGame()">Run! 🏃</button>
</div>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let W,H,GY,dino,obstacles=[],clouds=[],score=0,speed=4,raf,running=false,frame=0,hiScore=+localStorage.getItem('dino_hi')||0;

function resize(){W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;GY=H*.72;}
window.addEventListener('resize',()=>{resize();if(!running)drawStatic();});

const D={x:0,y:0,vy:0,w:0,h:0,onGround:true,frame:0};

function startGame(){
  document.getElementById('overlay').style.display='none';
  resize();
  D.w=H*.09;D.h=H*.1;D.x=W*.12;D.y=GY-D.h;D.vy=0;D.onGround=true;D.frame=0;
  obstacles=[];clouds=[];score=0;speed=4;frame=0;
  document.getElementById('score').textContent=0;
  running=true;loop();
}

function jump(){
  if(!running){startGame();return;}
  if(D.onGround){D.vy=H*-.022;D.onGround=false;if(navigator.vibrate)navigator.vibrate(8);}
}

function spawnObstacle(){
  const types=['🌵','🪨','🌿','🏔️'];
  obstacles.push({x:W+50,emoji:types[Math.floor(Math.random()*types.length)],
    w:D.w*.8,h:D.h*(0.8+Math.random()*.5),speed:speed*(0.9+Math.random()*.4)});
}
function spawnCloud(){
  clouds.push({x:W+50,y:H*(.1+Math.random()*.25),speed:1+Math.random()*.5,scale:.8+Math.random()*.6});
}

function loop(){
  if(!running)return;
  raf=requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);
  frame++;

  // Sky gradient
  const sk=ctx.createLinearGradient(0,0,0,GY);
  sk.addColorStop(0,'#87CEEB');sk.addColorStop(1,'#B0E2FF');
  ctx.fillStyle=sk;ctx.fillRect(0,0,W,GY);

  // Ground
  ctx.fillStyle='#4CAF50';ctx.fillRect(0,GY,W,H-GY);
  ctx.fillStyle='#388E3C';ctx.fillRect(0,GY,W,6);

  // Clouds
  if(frame%80===0)spawnCloud();
  clouds.forEach((c,i)=>{
    c.x-=c.speed;
    ctx.font=`${H*.06*c.scale}px serif`;ctx.textAlign='left';
    ctx.fillText('☁️',c.x,c.y);
    if(c.x<-80)clouds.splice(i,1);
  });

  // Dino physics
  D.vy+=H*.0012;D.y+=D.vy;
  if(D.y>=GY-D.h){D.y=GY-D.h;D.vy=0;D.onGround=true;}
  D.frame=D.onGround?Math.floor(frame/8)%2:2;

  // Draw dino
  const dinoEmoji=['🦕','🦖','🦕'][D.frame];
  ctx.font=`${D.h*1.1}px serif`;ctx.textAlign='center';
  ctx.fillText(dinoEmoji,D.x+D.w/2,D.y+D.h);

  // Obstacles
  speed=4+score*.04;
  if(frame%Math.max(40,80-score)===0)spawnObstacle();
  for(let i=obstacles.length-1;i>=0;i--){
    const o=obstacles[i];o.x-=o.speed;
    ctx.font=`${o.h*1.1}px serif`;ctx.textAlign='center';
    ctx.fillText(o.emoji,o.x+o.w/2,GY);
    // Collision (tight box)
    if(o.x<D.x+D.w*.7 && o.x+o.w*.7>D.x && GY-o.h<D.y+D.h*.7){endGame();return;}
    if(o.x<-80)obstacles.splice(i,1);
  }

  // Score
  if(frame%6===0){score++;document.getElementById('score').textContent=score;}
}

function endGame(){
  running=false;cancelAnimationFrame(raf);
  if(score>hiScore){hiScore=score;localStorage.setItem('dino_hi',score);}
  const ov=document.getElementById('overlay');ov.style.display='flex';
  ov.querySelector('.ov-title').textContent=score>=100?'🌟 Legend!':score>=50?'Amazing! 🎉':'Try Again! 💪';
  document.getElementById('finalScore').textContent=`Score: ${score} | Best: ${hiScore}`;
}

canvas.addEventListener('pointerdown',e=>{e.preventDefault();jump();});
document.addEventListener('keydown',e=>{if(e.code==='Space')jump();});
function drawStatic(){resize();ctx.clearRect(0,0,W,H);}
resize();
</script></body></html>
