<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🦍 Barrel Bash!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1a0a2e;--panel:rgba(255,255,255,.07);--pb:rgba(255,255,255,.15);
    --gold:#FFD700;--pink:#FF6B9D;--cyan:#00E5FF;--green:#69FF47;--purple:#C77DFF;--orange:#FF9500}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  body{background:var(--bg);font-family:'Nunito',sans-serif;color:#fff;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;overflow-x:hidden;
    background-image:radial-gradient(ellipse at 20% 20%,rgba(199,125,255,.15) 0%,transparent 50%),
      radial-gradient(ellipse at 80% 80%,rgba(0,229,255,.1) 0%,transparent 50%)}
  header{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px 6px;z-index:10}
  .back{background:var(--panel);border:2px solid var(--pb);color:#C8B8FF;border-radius:50%;
    width:44px;height:44px;font-size:20px;display:flex;align-items:center;justify-content:center;text-decoration:none}
  .title{font-family:'Fredoka One',cursive;font-size:24px;
    background:linear-gradient(135deg,var(--gold),var(--orange));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hud{width:100%;max-width:480px;display:flex;gap:8px;padding:0 16px 8px;z-index:10}
  .pill{flex:1;background:var(--panel);border:2px solid var(--pb);border-radius:16px;padding:6px 8px;text-align:center}
  .pill .lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#C8B8FF;margin-bottom:2px}
  .pill .val{font-family:'Fredoka One',cursive;font-size:20px;color:var(--gold)}
  #lv{color:var(--cyan)}
  .wrap{width:100%;max-width:480px;padding:0 16px;display:flex;flex-direction:column;align-items:center;gap:10px;z-index:10}
  #gc{border-radius:18px;border:3px solid var(--orange);
    box-shadow:0 0 30px rgba(255,149,0,.4),0 0 70px rgba(255,149,0,.15);
    display:block;max-width:100%;touch-action:none}
  .controls{display:flex;align-items:center;justify-content:space-between;width:100%;gap:8px}
  .dpad{position:relative;width:160px;height:160px;flex-shrink:0}
  .db{position:absolute;width:58px;height:58px;border:none;border-radius:16px;cursor:pointer;
    font-size:26px;display:flex;align-items:center;justify-content:center;
    user-select:none;box-shadow:0 6px 0 rgba(0,0,0,.45);transition:transform .08s,box-shadow .08s}
  .db:active{transform:translateY(4px)!important;box-shadow:0 2px 0 rgba(0,0,0,.45)!important}
  #du{background:linear-gradient(135deg,#a8edea,#fed6e3);color:#333;top:0;left:50%;transform:translateX(-50%)}
  #dd{background:linear-gradient(135deg,#a8edea,#fed6e3);color:#333;bottom:0;left:50%;transform:translateX(-50%)}
  #dl{background:linear-gradient(135deg,#ffecd2,#fcb69f);color:#333;left:0;top:50%;transform:translateY(-50%)}
  #dr{background:linear-gradient(135deg,#ffecd2,#fcb69f);color:#333;right:0;top:50%;transform:translateY(-50%)}
  #du:active{transform:translateX(-50%) translateY(4px)!important}
  #dd:active{transform:translateX(-50%) translateY(4px)!important}
  #dl:active{transform:translateY(calc(-50% + 4px))!important}
  #dr:active{transform:translateY(calc(-50% + 4px))!important}
  .dc{position:absolute;width:44px;height:44px;background:rgba(255,255,255,.06);
    border-radius:12px;top:50%;left:50%;transform:translate(-50%,-50%);
    border:2px solid rgba(255,255,255,.1)}
  .right-btns{display:flex;flex-direction:column;gap:8px;flex:1;align-items:center}
  .jump-btn{width:100px;height:100px;border:none;border-radius:50%;cursor:pointer;
    background:radial-gradient(circle,#FFD700,#ff9500);color:#333;
    font-family:'Fredoka One',cursive;font-size:16px;font-weight:900;
    box-shadow:0 0 20px rgba(255,215,0,.5),0 6px 0 rgba(0,0,0,.4);
    user-select:none;transition:transform .08s,box-shadow .08s;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .jump-btn:active{transform:scale(.93);box-shadow:0 0 10px rgba(255,215,0,.3),0 2px 0 rgba(0,0,0,.4)}
  #pb{width:100%;max-width:110px;height:40px;border:none;border-radius:14px;
    font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer;
    background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff;
    box-shadow:0 4px 0 rgba(0,0,0,.4)}
  #pb:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.4)}
  #overlay{position:fixed;inset:0;background:rgba(10,5,20,.9);display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px)}
  #overlay.hidden{display:none}
  .ocard{background:linear-gradient(135deg,#2d1b4e,#1a0a2e);border:3px solid var(--orange);
    border-radius:28px;padding:28px 32px;text-align:center;
    box-shadow:0 0 60px rgba(255,149,0,.35);max-width:340px;width:90%}
  .oem{font-size:56px;margin-bottom:10px;display:block;animation:bop .8s ease infinite alternate}
  @keyframes bop{from{transform:translateY(0)}to{transform:translateY(-10px)}}
  .otitle{font-family:'Fredoka One',cursive;font-size:30px;
    background:linear-gradient(135deg,var(--gold),var(--orange));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
  .osub{font-size:13px;color:#C8B8FF;margin-bottom:12px;line-height:1.55}
  .oscr{font-family:'Fredoka One',cursive;font-size:22px;color:var(--gold);margin-bottom:16px}
  .diff-row{display:flex;gap:8px;margin-bottom:14px}
  .diff-btn{flex:1;padding:8px 4px;border:2px solid rgba(255,255,255,.2);border-radius:12px;
    font-family:'Fredoka One',cursive;font-size:13px;cursor:pointer;
    background:rgba(255,255,255,.08);color:#fff;transition:all .15s}
  .diff-btn.active{background:linear-gradient(135deg,var(--orange),#ff6b35);border-color:transparent}
  .opbtn{background:linear-gradient(135deg,var(--orange),#ff6b35);border:none;
    border-radius:20px;color:#fff;font-family:'Fredoka One',cursive;font-size:21px;
    padding:13px 38px;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.4);width:100%}
  .opbtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.4)}
  .particle{position:fixed;pointer-events:none;font-size:22px;z-index:200;animation:fup .8s ease-out forwards}
  @keyframes fup{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-90px)}}
  .sp{height:16px}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">🏠</a>
  <div class="title">🦍 Barrel Bash!</div>
  <div style="width:44px"></div>
</header>
<div class="hud">
  <div class="pill"><div class="lbl">⭐ Score</div><div class="val" id="sc">0</div></div>
  <div class="pill"><div class="lbl">🏆 Best</div><div class="val" id="hi">0</div></div>
  <div class="pill"><div class="lbl">❤️ Lives</div><div class="val" id="lv2">❤️❤️❤️</div></div>
  <div class="pill"><div class="lbl">🚀 Level</div><div class="val" id="lv">1</div></div>
</div>
<div class="wrap">
  <canvas id="gc"></canvas>
  <div class="controls">
    <div class="dpad">
      <button class="db" id="du">⬆️</button>
      <button class="db" id="dl">⬅️</button>
      <div class="dc"></div>
      <button class="db" id="dr">➡️</button>
      <button class="db" id="dd">⬇️</button>
    </div>
    <div class="right-btns">
      <button class="jump-btn" onclick="doJump()"><span style="font-size:28px">🦘</span><span>JUMP!</span></button>
      <button id="pb" onclick="togglePause()">⏸ PAUSE</button>
    </div>
  </div>
  <div class="sp"></div>
</div>
<div id="overlay">
  <div class="ocard">
    <span class="oem" id="oem">🦍</span>
    <div class="otitle" id="otitle">Barrel Bash!</div>
    <div class="osub">Climb ladders ⬆️ and run across platforms! Jump over barrels 🛢️ rolling at you! Reach the 👸 princess at the top!</div>
    <div class="oscr" id="oscr"></div>
    <div class="diff-row">
      <button class="diff-btn active" id="d1" onclick="setDiff(1)">🌱 Easy</button>
      <button class="diff-btn" id="d2" onclick="setDiff(2)">🔥 Medium</button>
      <button class="diff-btn" id="d3" onclick="setDiff(3)">⚡ Hard</button>
    </div>
    <button class="opbtn" id="opbtn" onclick="startGame()">🦍 Climb!</button>
  </div>
</div>
<script>
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');

// ── EMOJI BLIT HELPER (fixes iOS/WebKit transparency) ─────────────
const _oc  = document.createElement('canvas');
const _oct = _oc.getContext('2d');
function blitEmojiFlip(emoji, fontSize, cx, cy, flipX) {
  const pad = 10;
  const sz  = Math.ceil(fontSize) + pad * 2;
  if (_oc.width  !== sz) _oc.width  = sz;
  if (_oc.height !== sz) _oc.height = sz;
  _oct.clearRect(0, 0, sz, sz);
  _oct.font         = `${fontSize}px serif`;
  _oct.textAlign    = 'center';
  _oct.textBaseline = 'middle';
  _oct.fillText(emoji, sz / 2, sz / 2);
  if (flipX) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(-1, 1);
    ctx.drawImage(_oc, -sz / 2, -sz / 2);
    ctx.restore();
  } else {
    ctx.drawImage(_oc, cx - sz / 2, cy - sz / 2);
  }
}

function blitEmoji(emoji, fontSize, cx, cy) {
  const pad = 10;
  const sz  = Math.ceil(fontSize) + pad * 2;
  if (_oc.width  !== sz) _oc.width  = sz;
  if (_oc.height !== sz) _oc.height = sz;
  _oct.clearRect(0, 0, sz, sz);
  _oct.font         = `${fontSize}px serif`;
  _oct.textAlign    = 'center';
  _oct.textBaseline = 'middle';
  _oct.fillText(emoji, sz / 2, sz / 2);
  ctx.drawImage(_oc, cx - sz / 2, cy - sz / 2);
}

const SZ     = Math.floor(Math.min(window.innerWidth - 32, 448));
canvas.width  = SZ;
canvas.height = Math.round(SZ * 1.25);
const CW = canvas.width, CH = canvas.height;

// ── DIFFICULTY ────────────────────────────────────────────────
const DIFF = {
  1: { barrelSpd:1.6, spawnRate:220, barrelCount:3  },
  2: { barrelSpd:2.5, spawnRate:160, barrelCount:5  },
  3: { barrelSpd:3.8, spawnRate:110, barrelCount:7  },
};
let diff = 1;
function setDiff(d){diff=d;[1,2,3].forEach(i=>document.getElementById('d'+i).classList.toggle('active',i===d));}

// ── PLATFORM LAYOUT ───────────────────────────────────────────
// Each platform: {y, x1, x2, dir (tilt), ladderX (null or x pos)}
// Built relative to CH so it scales
function makePlatforms(lvl) {
  lvl = lvl || 1;
  // Flip which side is "open" each level so the barrel route changes
  const flip = lvl % 2 === 0;   // even levels: odd rows open RIGHT, even rows open LEFT

  // Platform widths — each platform deliberately short so its open edge
  // hangs over clear air above the platform two rows below.
  // GAP = CW * 0.20 ensures a barrel-diameter gap at every fall point.
  const GAP  = CW * 0.22;  // how much each platform falls short of the wall
  // Vary ladder positions by level (cycles through 3 positions)
  const ladderCycle = [0.15, 0.25, 0.75, 0.85];
  const l = lvl - 1;

  // Helper: build a platform that tilts toward its OPEN edge
  // openRight = barrel rolls and falls off the right end
  // openLeft  = barrel rolls and falls off the left end
  const plat = (y, openRight, ladderFrac) => {
    // openRight: platform from 0 .. CW-GAP, tilt positive (rolls right)
    // openLeft:  platform from GAP .. CW,   tilt negative (rolls left)
    const x1 = openRight ? 0       : GAP;
    const x2 = openRight ? CW-GAP  : CW;
    const tilt = openRight ? 0.035 : -0.035;
    const lx = ladderFrac != null ? CW * ladderFrac : null;
    return { y, x1, x2, tilt, ladderX: lx,
             dropSide: openRight ? 'right' : 'left' };
  };

  // Each row alternates open side. flip inverts the whole stack each level.
  // Row 0 (ground): full width, no tilt — barrel spawns from row 4 and falls here last
  const r0open = !flip;   // which way ground row tilts (doesn't matter much, it's wide)
  const r1open = flip  ? false : true;   // row 1 open right or left
  const r2open = !r1open;               // row 2 opposite of row 1
  const r3open = r1open;                // row 3 same as row 1

  // Ladder positions cycle per level so layout feels fresh
  const lad0 = r1open ? 0.78 - (l%3)*0.12 : 0.15 + (l%3)*0.12;
  const lad1 = r2open ? 0.78 - (l%3)*0.10 : 0.18 + (l%3)*0.10;
  const lad2 = r3open ? 0.80 - (l%4)*0.08 : 0.15 + (l%4)*0.08;

  return [
    // Row 0: ground — full width so barrel always lands here
    { y:CH*0.90, x1:0, x2:CW, tilt:0, ladderX: CW*(0.15+(l%3)*0.12), dropSide:'right' },
    // Row 1: open on one side, ladder on the OTHER side (hero path)
    plat(CH*0.73, r1open, lad0),
    // Row 2: open opposite to row 1
    plat(CH*0.56, r2open, lad1),
    // Row 3: open same as row 1
    plat(CH*0.39, r3open, lad2),
    // Row 4: gorilla row — centered, narrower, no ladder (barrels spawn here)
    { y:CH*0.22, x1:CW*0.05, x2:CW*0.95, tilt:0, ladderX:null, dropSide:'right' },
    // Row 5: goal — narrow top
    { y:CH*0.10, x1:CW*0.3,  x2:CW*0.7,  tilt:0, ladderX:null, dropSide:'right' },
  ];
}
let platforms = [];

// ── PLAYER ───────────────────────────────────────────────────
let hero = {};
function resetHero() {
  hero = {
    x: platforms[0].x1 + CW*0.05,
    y: platforms[0].y - CW*0.06,
    vx: 0, vy: 0,
    w: CW*0.06, h: CW*0.07,
    onGround: false,
    onLadder: false,
    facingRight: true,
    jumping: false,
    invincible: 0,
  };
}

// ── BARRELS ───────────────────────────────────────────────────
let barrels = [], barrelTimer = 0;

function spawnBarrel() {
  const cfg = DIFF[diff];
  if (barrels.length >= cfg.barrelCount) return;
  barrels.push({
    x: CW * 0.48,          // gorilla throws from near top
    y: platforms[4].y - CW*0.04,
    vx: (Math.random() > 0.5 ? 1 : -1) * cfg.barrelSpd * (0.8 + Math.random()*0.4),
    vy: 0,
    r: CW * 0.028,
    platIdx: 4,
    rolling: true,
  });
}

// ── COINS ─────────────────────────────────────────────────────
let coins = [];
function spawnCoins() {
  coins = [];
  platforms.slice(0, 5).forEach((p, i) => {
    const n = 3 + i;
    for (let j = 0; j < n; j++) {
      coins.push({ x: p.x1 + (p.x2-p.x1)*(j+1)/(n+1), y: p.y - CW*0.06, r:CW*0.022, collected:false });
    }
  });
}

// ── STATE ─────────────────────────────────────────────────────
let score=0, highScore=0, lives=3, level=1;
let gameRunning=false, gamePaused=false;
let raf, lastTs=0;
const keys = {};

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  highScore = parseInt(localStorage.getItem('barrelHS')||'0');
  score=0; lives=3; level=1;
  platforms = makePlatforms(1);
  resetHero(); barrels=[]; barrelTimer=0; spawnCoins();
  updateHUD();
  gameRunning=true; gamePaused=false;
  document.getElementById('pb').textContent='⏸ PAUSE';
  lastTs=performance.now();
  if(raf) cancelAnimationFrame(raf);
  raf=requestAnimationFrame(loop);
}

function togglePause(){
  if(!gameRunning)return;
  gamePaused=!gamePaused;
  document.getElementById('pb').textContent=gamePaused?'▶️ GO!':'⏸ PAUSE';
  if(!gamePaused){lastTs=performance.now();raf=requestAnimationFrame(loop);}
}

function doJump(){
  if(!gameRunning||gamePaused) return;
  if(hero.onGround||hero.onLadder){
    hero.vy=-CH*0.018;
    hero.onGround=false;
    hero.onLadder=false;
    sfxJump();
    try{if(actx&&actx.state==='suspended')actx.resume();}catch(e){}
  }
}

// ── MAIN LOOP ──────────────────────────────────────────────────
function loop(ts){
  if(!gameRunning||gamePaused)return;
  const dt=Math.min(ts-lastTs,50); lastTs=ts;
  update(dt, ts); draw();
  raf=requestAnimationFrame(loop);
}

const GRAV = 0.45;
const MOVE_SPD = 3.5;
const CLIMB_SPD = 2.5;

function update(dt, ts){
  const sc = dt/16.67;
  if(hero.invincible>0) hero.invincible-=dt;

  // Barrel spawn
  barrelTimer+=dt;
  const cfg=DIFF[diff];
  const spawnInterval = Math.max(cfg.spawnRate - (level-1)*20, 80);
  if(barrelTimer>=spawnInterval){barrelTimer=0;spawnBarrel();}

  // ── Hero input ──────────────────────────────────────────────
  const movingLeft  = keys['ArrowLeft']  || keys['a'];
  const movingRight = keys['ArrowRight'] || keys['d'];
  const climbUp     = keys['ArrowUp']    || keys['w'];
  const climbDown   = keys['ArrowDown']  || keys['s'];

  hero.vx = 0;
  if(movingLeft)  { hero.vx=-MOVE_SPD*sc; hero.facingRight=false; }
  if(movingRight) { hero.vx= MOVE_SPD*sc; hero.facingRight=true;  }

  // Ladder detection
  const onAnyLadder = platforms.find(p =>
    p.ladderX && Math.abs(hero.x - p.ladderX) < CW*0.055 &&
    hero.y + hero.h >= p.y - CW*0.18 && hero.y <= p.y + 4
  );

  if(onAnyLadder && (climbUp||climbDown)){
    hero.onLadder=true;
    hero.vy = climbUp ? -CLIMB_SPD*sc : CLIMB_SPD*sc;
    hero.x  = onAnyLadder.ladderX;
  } else {
    if(!onAnyLadder) hero.onLadder=false;
  }

  if(!hero.onLadder) hero.vy += GRAV*sc;

  hero.x += hero.vx;
  hero.y += hero.vy;

  // ── Platform collisions ──────────────────────────────────────
  hero.onGround=false;
  platforms.forEach(p => {
    const tiltY = (hero.x - p.x1) * p.tilt;
    const platY = p.y + tiltY;
    if(hero.x+hero.w*0.5>=p.x1 && hero.x-hero.w*0.5<=p.x2 &&
       hero.y+hero.h>=platY && hero.y+hero.h<=platY+CW*0.06 && hero.vy>=0){
      hero.y=platY-hero.h; hero.vy=0; hero.onGround=true; hero.onLadder=false;
    }
  });

  // Bounds
  if(hero.x<hero.w/2) hero.x=hero.w/2;
  if(hero.x>CW-hero.w/2) hero.x=CW-hero.w/2;
  if(hero.y>CH+50) { loseLife(); return; }

  // ── Barrel physics ───────────────────────────────────────────
  for(let i=barrels.length-1;i>=0;i--){
    const b=barrels[i];
    b.vy+=GRAV*0.8*sc;
    b.x+=b.vx*sc;
    b.y+=b.vy*sc;

    // Barrel rolls along platforms
    // Key rule: barrel only lands on a platform if within its x1..x2 bounds.
    // Each platform has a dropSide — the barrel is always pushed toward that edge.
    // When the barrel rolls past the edge it falls freely to the next platform.
    let onPlat = false;
    let curPlat = null;
    platforms.forEach(p=>{
      const tiltY = (b.x - p.x1) * p.tilt;
      const platY = p.y + tiltY;
      const onX   = b.x + b.r > p.x1 && b.x - b.r < p.x2;
      if(onX && b.y+b.r >= platY && b.y+b.r <= platY+CW*0.12 && b.vy >= 0){
        b.y = platY - b.r;
        b.vy = 0;
        onPlat = true;
        curPlat = p;
        // Tilt adds gentle push toward open edge
        b.vx += p.tilt * cfg.barrelSpd * 2;
      }
    });

    if(onPlat && curPlat){
      // Always enforce minimum speed toward the open (drop) edge
      const minSpd = cfg.barrelSpd * 1.0;
      const goRight = curPlat.dropSide === 'right';
      // If barrel is moving wrong way or too slow, correct it
      if(goRight  && b.vx < minSpd)  b.vx += cfg.barrelSpd * 0.15;
      if(!goRight && b.vx > -minSpd) b.vx -= cfg.barrelSpd * 0.15;
      // Hard cap so barrels don't fly off-screen
      const maxSpd = cfg.barrelSpd * 3;
      b.vx = Math.max(-maxSpd, Math.min(maxSpd, b.vx));
    }

    // Wall handling — only bounce when airborne, never when on platform
    if(!onPlat){
      if(b.x - b.r < 0)  { b.x = b.r;    b.vx =  Math.abs(b.vx) * 0.5; }
      if(b.x + b.r > CW) { b.x = CW-b.r; b.vx = -Math.abs(b.vx) * 0.5; }
    }
    if(b.y > CH + 60){ barrels.splice(i,1); continue; }

    // Barrel-hero collision
    if(hero.invincible<=0 && Math.hypot(b.x-hero.x,b.y-(hero.y+hero.h/2))<b.r+hero.w*0.4){
      barrels.splice(i,1);
      loseLife(); return;
    }
  }

  // ── Coin collection ──────────────────────────────────────────
  coins.forEach(c=>{
    if(c.collected)return;
    if(Math.hypot(c.x-hero.x,c.y-(hero.y+hero.h/2))<c.r+hero.w*0.4){
      c.collected=true; score+=10; updateHUD(); sfxCoin();
      spawnPtcl('⭐',c.x,c.y);
    }
  });

  // ── Reach goal ───────────────────────────────────────────────
  const goalPlat=platforms[5];
  if(hero.y<goalPlat.y && hero.x>goalPlat.x1 && hero.x<goalPlat.x2){
    score+=200*level; level++;
    sfxWin();
    for(let i=0;i<6;i++) setTimeout(()=>spawnPtcl(['🎉','⭐','👑'][Math.floor(Math.random()*3)],CW/2,CH/2),i*100);
    platforms=makePlatforms(level); resetHero(); barrels=[]; barrelTimer=0; spawnCoins();
    updateHUD();
  }

  // Score ticker
  if(Math.floor(ts/1000) > Math.floor((ts-dt)/1000)){ score+=level; updateHUD(); }
}

function loseLife(){
  lives--; updateHUD();
  if(lives<=0){
    gameRunning=false;
    if(score>highScore){highScore=score;localStorage.setItem('barrelHS',highScore);}
    setTimeout(()=>showOverlay('💥','Barrel Got You!','So brave! Try again!','⭐ '+score+' points!','🔄 Play Again!',startGame),400);
    return;
  }
  resetHero(); barrels=[]; hero.invincible=2000;
}

function updateHUD(){
  document.getElementById('sc').textContent=score;
  document.getElementById('hi').textContent=highScore;
  document.getElementById('lv2').textContent='❤️'.repeat(Math.max(0,lives));
  document.getElementById('lv').textContent=level;
}
function showOverlay(em,ti,su,sc,bt,cb){
  document.getElementById('oem').textContent=em;
  document.getElementById('otitle').textContent=ti;
  document.getElementById('osub').textContent=su;
  document.getElementById('oscr').textContent=sc;
  const b=document.querySelector('#opbtn,.opbtn');
  if(b){ b.textContent=bt; b.onclick=function(){ if(cb) cb(); else startGame(); }; }
  document.getElementById('overlay').classList.remove('hidden');
}

// ── DRAW ──────────────────────────────────────────────────────
function draw(){
  // Background
  const bg=ctx.createLinearGradient(0,0,0,CH);
  bg.addColorStop(0,'#0d0520'); bg.addColorStop(1,'#1a0a2e');
  ctx.fillStyle=bg; ctx.fillRect(0,0,CW,CH);

  // Stars
  ctx.fillStyle='rgba(255,255,255,.3)';
  [[CW*.1,CH*.05],[CW*.4,CH*.12],[CW*.7,CH*.08],[CW*.9,CH*.18],[CW*.25,CH*.3]].forEach(([x,y])=>{
    ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();
  });

  // Platforms
  platforms.forEach((p,i)=>{
    const tiltL=(p.x1-p.x1)*p.tilt, tiltR=(p.x2-p.x1)*p.tilt;
    const col=i===5?'#FFD700':i===0?'#4a2800':'#5a3010';
    const glow=i===5?'#FFD700':col;
    ctx.shadowColor=glow; ctx.shadowBlur=i===5?14:6;
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.moveTo(p.x1, p.y+tiltL+12);
    ctx.lineTo(p.x2, p.y+tiltR+12);
    ctx.lineTo(p.x2, p.y+tiltR+24);
    ctx.lineTo(p.x1, p.y+tiltL+24);
    ctx.closePath(); ctx.fill();
    // Top surface
    ctx.fillStyle='#8B5E3C';
    ctx.beginPath();
    ctx.moveTo(p.x1, p.y+tiltL);
    ctx.lineTo(p.x2, p.y+tiltR);
    ctx.lineTo(p.x2, p.y+tiltR+14);
    ctx.lineTo(p.x1, p.y+tiltL+14);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;

    // Ladder
    if(p.ladderX){
      const nextP=platforms[i-1];
      if(nextP){
        const lx=p.ladderX, ly=nextP.y, lh=p.y-nextP.y;
        ctx.fillStyle='#8B5E3C'; ctx.fillRect(lx-4,ly,4,lh); ctx.fillRect(lx+4,ly,4,lh);
        ctx.fillStyle='#6B4A2A';
        for(let ry=ly+12;ry<ly+lh;ry+=20) ctx.fillRect(lx-4,ry,12,4);
      }
    }
  });

  // Coins
  coins.forEach(c=>{
    if(c.collected)return;
    blitEmoji('💰', c.r*2.2, c.x, c.y);
  });

  // Barrels
  barrels.forEach(b=>{
    ctx.save();
    ctx.translate(b.x,b.y);
    ctx.rotate(Date.now()*b.vx*0.003);
    ctx.shadowColor='#ff4400';ctx.shadowBlur=8;
    blitEmoji('🛢️', b.r*2.2, 0, 0);
    ctx.restore();ctx.shadowBlur=0;
  });

  // Gorilla at top
  ctx.shadowColor='#FF9500';ctx.shadowBlur=12;
  blitEmoji('🦍', CW*0.1, CW*0.5, platforms[4].y-CW*0.07);
  ctx.shadowBlur=0;

  // Princess/goal at top platform
  blitEmoji('👸', CW*0.08, CW*0.5, platforms[5].y-CW*0.06);

  // Hero
  if(hero.invincible<=0||Math.floor(hero.invincible/100)%2===0){
    ctx.shadowColor='#00E5FF';ctx.shadowBlur=10;
    blitEmojiFlip('🧑', hero.h*1.1, hero.x, hero.y+hero.h/2, !hero.facingRight);
    ctx.shadowBlur=0;
  }

  if(gamePaused){
    ctx.fillStyle='rgba(10,5,30,.72)';ctx.fillRect(0,0,CW,CH);
    ctx.font=`bold ${CW*.12}px "Fredoka One",cursive`;
    ctx.fillStyle='#FFD700';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⏸',CW/2,CH/2);
  }
}

// ── AUDIO ──────────────────────────────────────────────────────
let actx;
function beep(f,d,t,v){
  try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);o.type=t||'square';o.frequency.value=f;
    g.gain.setValueAtTime(v||.1,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);
    o.start();o.stop(actx.currentTime+d);}catch(e){}
}
function sfxJump(){beep(440,.06,'sine',.1);}
function sfxCoin(){beep(660,.07,'square',.1);setTimeout(()=>beep(880,.06,'square',.08),80);}
function sfxWin(){[440,550,660,770,880].forEach((f,i)=>setTimeout(()=>beep(f,.1,'square',.12),i*80));}

// ── INPUT ───────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.code==='Space'||e.key==='z'||e.key==='Z'){e.preventDefault();doJump();}
  if(e.key==='p'||e.key==='Escape')togglePause();
});
document.addEventListener('keyup',e=>keys[e.key]=false);

const DMAP={du:'ArrowUp',dd:'ArrowDown',dl:'ArrowLeft',dr:'ArrowRight'};
Object.entries(DMAP).forEach(([id,key])=>{
  const btn=document.getElementById(id);
  btn.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true;try{if(actx&&actx.state==='suspended')actx.resume();}catch(e2){}},{passive:false});
  btn.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false;},{passive:false});
  btn.addEventListener('mousedown',()=>keys[key]=true);
  btn.addEventListener('mouseup',()=>keys[key]=false);
  btn.addEventListener('mouseleave',()=>keys[key]=false);
});

function spawnPtcl(e,cx,cy){
  const el=document.createElement('div');el.className='particle';el.textContent=e;
  const r=canvas.getBoundingClientRect();
  el.style.left=(r.left+cx)+'px';el.style.top=(r.top+cy)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),800);
}
draw();
</script>
