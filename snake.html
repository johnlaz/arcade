<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 Slither Munch!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root { --bg:#1a0a2e; --panel:rgba(255,255,255,.07); --pb:rgba(255,255,255,.15);
    --gold:#FFD700; --pink:#FF6B9D; --cyan:#00E5FF; --green:#69FF47; --purple:#C77DFF; --orange:#FF9500; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  body{background:var(--bg);font-family:'Nunito',sans-serif;color:#fff;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;overflow-x:hidden;
    background-image:radial-gradient(ellipse at 20% 20%,rgba(199,125,255,.15) 0%,transparent 50%),
      radial-gradient(ellipse at 80% 80%,rgba(0,229,255,.1) 0%,transparent 50%)}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,.5) 0%,transparent 100%),
      radial-gradient(1px 1px at 40% 10%,rgba(255,255,255,.4) 0%,transparent 100%),
      radial-gradient(1px 1px at 70% 25%,rgba(255,255,255,.4) 0%,transparent 100%),
      radial-gradient(1px 1px at 85% 60%,rgba(255,255,255,.3) 0%,transparent 100%),
      radial-gradient(1px 1px at 25% 75%,rgba(255,255,255,.4) 0%,transparent 100%)}
  header{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px 6px;position:relative;z-index:10}
  .back{background:var(--panel);border:2px solid var(--pb);color:#C8B8FF;border-radius:50%;
    width:44px;height:44px;font-size:20px;display:flex;align-items:center;justify-content:center;text-decoration:none}
  .title{font-family:'Fredoka One',cursive;font-size:26px;
    background:linear-gradient(135deg,var(--gold),var(--pink));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hud{width:100%;max-width:480px;display:flex;gap:8px;padding:0 16px 8px;z-index:10}
  .pill{flex:1;background:var(--panel);border:2px solid var(--pb);border-radius:16px;padding:6px 8px;text-align:center}
  .pill .lbl{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#C8B8FF;margin-bottom:2px}
  .pill .val{font-family:'Fredoka One',cursive;font-size:20px;color:var(--gold)}
  #lv{color:var(--cyan)}
  .wrap{width:100%;max-width:480px;padding:0 16px;display:flex;flex-direction:column;align-items:center;gap:10px;z-index:10}
  #gc{border-radius:18px;border:3px solid var(--purple);
    box-shadow:0 0 30px rgba(199,125,255,.4),0 0 70px rgba(199,125,255,.15);
    display:block;max-width:100%;touch-action:none}
  .speed-row{display:flex;align-items:center;gap:10px;width:100%;
    background:var(--panel);border:2px solid var(--pb);border-radius:16px;padding:10px 16px}
  .speed-row label{font-family:'Fredoka One',cursive;font-size:15px;color:#C8B8FF;white-space:nowrap}
  .speed-row input{flex:1;accent-color:var(--pink);cursor:pointer}
  .sv{font-family:'Fredoka One',cursive;font-size:15px;color:var(--gold);min-width:28px;text-align:right}
  .dpad{position:relative;width:200px;height:200px}
  .db{position:absolute;width:64px;height:64px;border:none;border-radius:16px;cursor:pointer;
    font-size:28px;display:flex;align-items:center;justify-content:center;
    user-select:none;box-shadow:0 6px 0 rgba(0,0,0,.45);transition:transform .08s,box-shadow .08s}
  .db:active{transform:translateY(4px)!important;box-shadow:0 2px 0 rgba(0,0,0,.45)!important}
  #du{background:linear-gradient(135deg,#a8edea,#fed6e3);color:#333;top:0;left:50%;transform:translateX(-50%)}
  #dd{background:linear-gradient(135deg,#a8edea,#fed6e3);color:#333;bottom:0;left:50%;transform:translateX(-50%)}
  #dl{background:linear-gradient(135deg,#ffecd2,#fcb69f);color:#333;left:0;top:50%;transform:translateY(-50%)}
  #dr{background:linear-gradient(135deg,#ffecd2,#fcb69f);color:#333;right:0;top:50%;transform:translateY(-50%)}
  #du:active{transform:translateX(-50%) translateY(4px)!important}
  #dd:active{transform:translateX(-50%) translateY(4px)!important}
  #dl:active{transform:translateY(calc(-50% + 4px))!important}
  #dr:active{transform:translateY(calc(-50% + 4px))!important}
  .dc{position:absolute;width:48px;height:48px;background:rgba(255,255,255,.06);
    border-radius:12px;top:50%;left:50%;transform:translate(-50%,-50%);
    border:2px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:22px}
  .brow{display:flex;gap:12px;width:100%;justify-content:center}
  .abtn{flex:1;max-width:180px;height:56px;border:none;border-radius:18px;
    font-family:'Fredoka One',cursive;font-size:17px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:7px;
    box-shadow:0 6px 0 rgba(0,0,0,.4);user-select:none;transition:transform .1s,box-shadow .1s}
  .abtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.4)}
  #pb{background:linear-gradient(135deg,var(--purple),#7c3aed);color:#fff}
  #overlay{position:fixed;inset:0;background:rgba(10,5,20,.9);display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px)}
  #overlay.hidden{display:none}
  .ocard{background:linear-gradient(135deg,#2d1b4e,#1a0a2e);border:3px solid var(--purple);
    border-radius:28px;padding:30px 34px;text-align:center;
    box-shadow:0 0 60px rgba(199,125,255,.35);max-width:340px;width:90%}
  .oem{font-size:60px;margin-bottom:10px;display:block;animation:bop .8s ease infinite alternate}
  @keyframes bop{from{transform:translateY(0)}to{transform:translateY(-12px)}}
  .otitle{font-family:'Fredoka One',cursive;font-size:32px;
    background:linear-gradient(135deg,var(--gold),var(--pink));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
  .osub{font-size:14px;color:#C8B8FF;margin-bottom:14px;line-height:1.55}
  .oscr{font-family:'Fredoka One',cursive;font-size:24px;color:var(--gold);margin-bottom:20px}
  .opbtn{background:linear-gradient(135deg,var(--pink),var(--purple));border:none;
    border-radius:20px;color:#fff;font-family:'Fredoka One',cursive;font-size:22px;
    padding:14px 40px;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.4);width:100%;
    transition:transform .1s,box-shadow .1s}
  .opbtn:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(0,0,0,.4)}
  .particle{position:fixed;pointer-events:none;font-size:24px;z-index:200;
    animation:fup 1s ease-out forwards}
  @keyframes fup{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-120px) scale(.3)}}
  .sp{height:20px}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">🏠</a>
  <div class="title">🐍 Slither Munch!</div>
  <div style="width:44px"></div>
</header>
<div class="hud">
  <div class="pill"><div class="lbl">⭐ Score</div><div class="val" id="sc">0</div></div>
  <div class="pill"><div class="lbl">🏆 Best</div><div class="val" id="hi">0</div></div>
  <div class="pill"><div class="lbl">🍎 Eaten</div><div class="val" id="ea">0</div></div>
  <div class="pill"><div class="lbl">🚀 Level</div><div class="val" id="lv">1</div></div>
</div>
<div class="wrap">
  <canvas id="gc"></canvas>
  <div class="speed-row">
    <label>🐢 Speed</label>
    <input type="range" id="sl" min="1" max="5" value="2">
    <div class="sv" id="sv">2</div>
    <label>⚡</label>
  </div>
  <div class="dpad">
    <button class="db" id="du">⬆️</button>
    <button class="db" id="dl">⬅️</button>
    <div class="dc">🐍</div>
    <button class="db" id="dr">➡️</button>
    <button class="db" id="dd">⬇️</button>
  </div>
  <div class="brow">
    <button class="abtn" id="pb" onclick="togglePause()">⏸ PAUSE</button>
  </div>
  <div class="sp"></div>
</div>
<div id="overlay">
  <div class="ocard">
    <span class="oem" id="oem">🐍</span>
    <div class="otitle" id="otitle">Slither Munch!</div>
    <div class="osub" id="osub">Swipe or use the D-pad to turn! Eat 🍎 fruit to grow. Don't hit the walls or your own tail!</div>
    <div class="oscr" id="oscr"></div>
    <button class="opbtn" id="obtn" onclick="startGame()">🎮 Let's Slither!</button>
  </div>
</div>
<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const SZ = Math.floor(Math.min(window.innerWidth - 32, 448));
const GRID = 20; // cells across
const CELL = Math.floor(SZ / GRID);
canvas.width = canvas.height = GRID * CELL;
const CW = canvas.width;

// Speed: ms per step
const SPD = [220, 160, 110, 75, 48];
let spdIdx = 1;
document.getElementById('sl').addEventListener('input', function() {
  spdIdx = this.value - 1;
  document.getElementById('sv').textContent = this.value;
});

// Fruits with point values
const FRUITS = [
  {e:'🍎',p:10},{e:'🍊',p:15},{e:'🍋',p:12},{e:'🍇',p:20},
  {e:'🍓',p:18},{e:'🌟',p:30},{e:'💎',p:50},{e:'🍭',p:25}
];

let snake, dir, nextDir, fruit, score, highScore, eaten, level;
let gameRunning = false, gamePaused = false;
let stepTimer = 0, lastTs = 0, raf;
let specialFruit = null, specialTimer = 0;

function rnd(n) { return Math.floor(Math.random() * n); }

function initGame() {
  const mid = Math.floor(GRID / 2);
  snake = [{x: mid, y: mid}, {x: mid-1, y: mid}, {x: mid-2, y: mid}];
  dir = {x:1, y:0}; nextDir = {x:1, y:0};
  score = 0; eaten = 0; level = 1;
  stepTimer = 0;
  placeFruit(); placeFruit();
  specialFruit = null; specialTimer = 0;
}

function placeFruit() {
  let pos;
  do { pos = {x: rnd(GRID), y: rnd(GRID)}; }
  while (snake.some(s => s.x===pos.x && s.y===pos.y));
  const f = FRUITS[rnd(FRUITS.length)];
  fruit = {...pos, ...f};
}

function placeSpecial() {
  if (specialFruit) return;
  let pos;
  do { pos = {x: rnd(GRID), y: rnd(GRID)}; }
  while (snake.some(s => s.x===pos.x && s.y===pos.y));
  specialFruit = {...pos, e:'⭐', p:100};
  specialTimer = 5000;
}

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  highScore = parseInt(localStorage.getItem('snakeHS')||'0');
  initGame(); updateHUD();
  gameRunning = true; gamePaused = false;
  document.getElementById('pb').textContent = '⏸ PAUSE';
  lastTs = performance.now(); stepTimer = 0;
  if (raf) cancelAnimationFrame(raf);
  raf = requestAnimationFrame(loop);
}

function togglePause() {
  if (!gameRunning) return;
  gamePaused = !gamePaused;
  document.getElementById('pb').textContent = gamePaused ? '▶️ GO!' : '⏸ PAUSE';
  if (!gamePaused) { lastTs = performance.now(); raf = requestAnimationFrame(loop); }
}

function loop(ts) {
  if (!gameRunning || gamePaused) return;
  const dt = Math.min(ts - lastTs, 100);
  lastTs = ts;
  stepTimer += dt;
  if (specialFruit) { specialTimer -= dt; if (specialTimer <= 0) specialFruit = null; }
  if (stepTimer >= SPD[spdIdx]) {
    stepTimer -= SPD[spdIdx];
    step();
  }
  draw();
  raf = requestAnimationFrame(loop);
}

function step() {
  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision — wrap or die
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
    gameOver(); return;
  }
  // Self collision
  if (snake.slice(1).some(s => s.x===head.x && s.y===head.y)) {
    gameOver(); return;
  }

  snake.unshift(head);

  // Eat fruit
  if (head.x===fruit.x && head.y===fruit.y) {
    score += fruit.p * level; eaten++;
    sfxEat();
    spawn('🎉', head.x*CELL+CELL/2, head.y*CELL+CELL/2);
    placeFruit();
    if (eaten % 5 === 0) { level++; placeSpecial(); }
    updateHUD();
  } else if (specialFruit && head.x===specialFruit.x && head.y===specialFruit.y) {
    score += specialFruit.p * level; eaten++;
    sfxEat(); spawn('⭐', head.x*CELL+CELL/2, head.y*CELL+CELL/2);
    specialFruit = null; updateHUD();
  } else {
    snake.pop();
  }
}

function gameOver() {
  gameRunning = false;
  if (score > highScore) { highScore = score; localStorage.setItem('snakeHS', highScore); }
  sfxDie();
  setTimeout(() => {
    showOverlay('😵','Game Over!',`You grew to ${snake.length} segments! Try again!`,'⭐ '+score+' points!','🔄 Play Again!', startGame);
  }, 300);
}

function updateHUD() {
  document.getElementById('sc').textContent = score;
  document.getElementById('hi').textContent = highScore;
  document.getElementById('ea').textContent = eaten;
  document.getElementById('lv').textContent = level;
}

function showOverlay(em,ti,su,sc,bt,cb) {
  document.getElementById('oem').textContent = em;
  document.getElementById('otitle').textContent = ti;
  document.getElementById('osub').textContent = su;
  document.getElementById('oscr').textContent = sc;
  const b = document.getElementById('obtn');
  b.textContent = bt; b.onclick = cb || startGame;
  document.getElementById('overlay').classList.remove('hidden');
}

// ── DRAW ───────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#080412'; ctx.fillRect(0,0,CW,CW);
  // Grid
  ctx.fillStyle = 'rgba(255,255,255,.03)';
  for (let x=0;x<GRID;x++) for (let y=0;y<GRID;y++) ctx.fillRect(x*CELL+CELL/2-1,y*CELL+CELL/2-1,2,2);

  // Snake body
  snake.forEach((s, i) => {
    const t = 1 - i / snake.length;
    const r = Math.round(80 + 105*t), g2 = Math.round(200 + 55*t);
    ctx.fillStyle = `rgb(${r},${g2},80)`;
    ctx.shadowColor = '#69FF47'; ctx.shadowBlur = i===0 ? 16 : 4;
    roundRect(s.x*CELL+2, s.y*CELL+2, CELL-4, CELL-4, i===0 ? CELL*0.4 : CELL*0.25);
    ctx.fill();
    ctx.shadowBlur = 0;
    // Head eyes
    if (i===0) {
      ctx.fillStyle = '#fff';
      const ex1 = s.x*CELL + CELL*0.3 + dir.y*CELL*0.15;
      const ey1 = s.y*CELL + CELL*0.3 - dir.x*CELL*0.15;
      const ex2 = s.x*CELL + CELL*0.7 - dir.y*CELL*0.15;
      const ey2 = s.y*CELL + CELL*0.3 + dir.x*CELL*0.15;
      ctx.beginPath(); ctx.arc(ex1,ey1,CELL*0.12,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2,ey2,CELL*0.12,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath(); ctx.arc(ex1+dir.x*2,ey1+dir.y*2,CELL*0.07,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2+dir.x*2,ey2+dir.y*2,CELL*0.07,0,Math.PI*2); ctx.fill();
    }
  });

  // Fruit
  drawEmoji(fruit.e, fruit.x*CELL+CELL/2, fruit.y*CELL+CELL/2, CELL*0.72);

  // Special fruit (pulsing)
  if (specialFruit) {
    const pulse = 0.85 + Math.sin(Date.now()/150)*0.15;
    ctx.save(); ctx.scale(pulse,pulse);
    drawEmoji(specialFruit.e,
      specialFruit.x*CELL/pulse+CELL/(2*pulse),
      specialFruit.y*CELL/pulse+CELL/(2*pulse), CELL*0.85);
    ctx.restore();
    // Timer bar
    const pct = specialTimer / 5000;
    ctx.fillStyle = 'rgba(255,215,0,0.6)';
    ctx.fillRect(specialFruit.x*CELL, specialFruit.y*CELL+CELL-4, CELL*pct, 4);
  }

  if (gamePaused) drawPause();
}

function drawEmoji(e, x, y, size) {
  ctx.font = `${size}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(e, x, y);
}

function drawPause() {
  ctx.fillStyle = 'rgba(10,5,30,.72)'; ctx.fillRect(0,0,CW,CW);
  ctx.font = `bold ${CELL*1.8}px "Fredoka One",cursive`;
  ctx.fillStyle = '#FFD700'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('⏸', CW/2, CW/2);
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ── AUDIO ───────────────────────────────────────────────────────
let actx;
function beep(f,d,t,v){
  try{
    if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);
    o.type=t||'square';o.frequency.value=f;
    g.gain.setValueAtTime(v||.1,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);
    o.start();o.stop(actx.currentTime+d);
  }catch(e){}
}
function sfxEat(){beep(520,.06,'square',.12);setTimeout(()=>beep(660,.06,'square',.1),70)}
function sfxDie(){[300,240,180].forEach((f,i)=>setTimeout(()=>beep(f,.1,'sawtooth',.15),i*90))}

// ── INPUT ────────────────────────────────────────────────────────
function setDir(dx,dy) {
  if (!gameRunning || gamePaused) return;
  if (dx===1&&dir.x===-1) return; if (dx===-1&&dir.x===1) return;
  if (dy===1&&dir.y===-1) return; if (dy===-1&&dir.y===1) return;
  nextDir = {x:dx,y:dy};
  try{if(actx&&actx.state==='suspended')actx.resume()}catch(e){}
}

[['du',0,-1],['dd',0,1],['dl',-1,0],['dr',1,0]].forEach(([id,dx,dy])=>{
  const b=document.getElementById(id);
  b.addEventListener('touchstart',e=>{e.preventDefault();setDir(dx,dy)},{passive:false});
  b.addEventListener('mousedown',()=>setDir(dx,dy));
});

document.addEventListener('keydown',e=>{
  const m={'ArrowUp':[0,-1],'ArrowDown':[0,1],'ArrowLeft':[-1,0],'ArrowRight':[1,0],
    'w':[0,-1],'s':[0,1],'a':[-1,0],'d':[1,0]};
  if(m[e.key]){e.preventDefault();setDir(...m[e.key]);}
  if(e.key==='p'||e.key==='Escape')togglePause();
});

// Swipe
let ts0=null,tx0,ty0;
canvas.addEventListener('touchstart',e=>{e.preventDefault();ts0=e.touches[0];tx0=ts0.clientX;ty0=ts0.clientY},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();if(!ts0)return;
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)>Math.abs(dy)){if(Math.abs(dx)>14)setDir(dx>0?1:-1,0);}
  else{if(Math.abs(dy)>14)setDir(0,dy>0?1:-1);}
  ts0=null;
},{passive:false});

// ── PARTICLES ───────────────────────────────────────────────────
function spawn(e,cx,cy){
  const el=document.createElement('div');
  el.className='particle';el.textContent=e;
  const r=canvas.getBoundingClientRect();
  el.style.left=(r.left+cx)+'px';el.style.top=(r.top+cy)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1000);
}

// Boot
draw();
</script>
</body>
</html>
